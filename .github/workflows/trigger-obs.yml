name: Trigger OBS services
on:
  push:
    branches: [main]
  workflow_dispatch:        # 手动触发入口，测试和补触发用
    inputs:
      package:
        description: "Force-trigger this package (skip diff)"
        required: false
        default: ""

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # diff 需要完整历史

      - name: Determine changed packages
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            echo "${{ github.event.inputs.package }}" > /tmp/pkgs
          else
            before="${{ github.event.before }}"
            case "$before" in
              ""|00000000*) range="${{ github.sha }}~1..${{ github.sha }}" ;;  # 新分支首推
              *)            range="$before..${{ github.sha }}" ;;
            esac
            git diff --name-only "$range" |
              awk -F/ '$1=="SPECS" && $2 {print $2}' | sort -u > /tmp/pkgs
          fi
          echo "Packages to trigger:"; cat /tmp/pkgs

      - name: Trigger OBS
        env:
          OBS_TOKEN: ${{ secrets.OBS_TRIGGER_TOKEN }}
        run: |
          rc=0
          while read -r pkg; do
            [ -n "$pkg" ] || continue
            code=$(curl -sS -o /tmp/resp -w "%{http_code}" -X POST \
              -H "Authorization: Token $OBS_TOKEN" \
              "https://pickaxe.oerv.ac.cn/trigger/runservice?project=home:Sakura286:ROCm_PyTorch_Submit&package=$pkg")
            echo "== $pkg -> HTTP $code"; cat /tmp/resp; echo
            [ "$code" = "200" ] || rc=1
          done < /tmp/pkgs
          exit $rc